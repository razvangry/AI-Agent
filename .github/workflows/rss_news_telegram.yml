name: RSS News Telegram

# Rulează zilnic la 7:00 AM UTC
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: # pentru rulare manuală

jobs:
  send_news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests textblob feedparser

    - name: Run RSS News Telegram script
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python rss_news_telegram_mobile.py
